<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบแจ้งเตือน FCM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
        <div class="text-center mb-6">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-100 text-blue-600 rounded-full mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">FCM Notification</h1>
            <p class="text-gray-500 mt-2">รับการแจ้งเตือนแบบ Real-time</p>
        </div>

        <div class="space-y-4">
            <!-- สถานะการเชื่อมต่อ -->
            <div id="statusContainer" class="p-3 rounded-lg text-sm font-medium text-center bg-gray-100 text-gray-600">
                กำลังตรวจสอบสถานะ...
            </div>

            <!-- ส่วนแสดง Token -->
            <div class="hidden" id="tokenArea">
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Registration Token</label>
                <div class="relative">
                    <textarea id="tokenDisplay" readonly class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg text-xs font-mono break-all h-24 focus:outline-none"></textarea>
                    <button id="copyBtn" class="absolute bottom-2 right-2 px-3 py-1 bg-blue-600 text-white text-xs rounded hover:bg-blue-700 transition">คัดลอก</button>
                </div>
                <p class="text-xs text-gray-400 mt-2">* ใช้ Token นี้เพื่อส่งข้อความทดสอบจาก Firebase Console</p>
            </div>

            <button id="requestBtn" class="w-full py-3 px-4 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl transition duration-200 shadow-lg shadow-blue-200 flex items-center justify-center gap-2">
                อนุญาตการแจ้งเตือน
            </button>
        </div>

        <!-- กล่องแสดงข้อความที่ได้รับ -->
        <div id="messageLog" class="mt-6 space-y-2 max-h-40 overflow-y-auto hidden">
            <h3 class="text-sm font-bold text-gray-700">ข้อความล่าสุด:</h3>
            <div id="logContent" class="text-sm text-gray-600 space-y-2"></div>
        </div>
    </div>

    <!-- Firebase App & Messaging SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js";

        // 1. กำหนดค่า Firebase Config ของคุณที่นี่
        const firebaseConfig = {
            apiKey: "AIzaSyB7DsjL609OXOnwjxnG00mvLnFpJ1G8EnQ",
            authDomain: "teepakorn-66b78.firebaseapp.com",
            projectId: "teepakorn-66b78",
            storageBucket: "teepakorn-66b78.firebasestorage.app",
            messagingSenderId: "179939363608",
            appId: "1:179939363608:web:e93f820cbfaf5156bd6c6d"
        };

        // 2. กำหนด VAPID Key (Public Key จาก Web Push certificates)
        const vapidKey = "BOVM0pI0gXx4O-0gG_a48hszXM-OOuRYl9GcpzN3QiaKHtUqRDR6BQMFOv-dtsZ-2fwYTdGwtY7HWM2sqF_dShI";

        // เริ่มต้นการทำงาน
        const app = initializeApp(firebaseConfig);
        const messaging = getMessaging(app);

        const requestBtn = document.getElementById('requestBtn');
        const tokenArea = document.getElementById('tokenArea');
        const tokenDisplay = document.getElementById('tokenDisplay');
        const statusContainer = document.getElementById('statusContainer');
        const logContent = document.getElementById('logContent');
        const messageLog = document.getElementById('messageLog');
        const copyBtn = document.getElementById('copyBtn');

        // ฟังก์ชันอัปเดตสถานะ UI
        function updateStatus(message, type = 'info') {
            statusContainer.textContent = message;
            statusContainer.className = `p-3 rounded-lg text-sm font-medium text-center ${
                type === 'success' ? 'bg-green-100 text-green-700' : 
                type === 'error' ? 'bg-red-100 text-red-700' : 'bg-gray-100 text-gray-600'
            }`;
        }

        // ขอสิทธิ์การแจ้งเตือนและรับ Token
        async function requestPermission() {
            try {
                updateStatus('กำลังขอสิทธิ์...');
                const permission = await Notification.requestPermission();
                
                if (permission === 'granted') {
                    const token = await getToken(messaging, { vapidKey: vapidKey });
                    if (token) {
                        tokenDisplay.value = token;
                        tokenArea.classList.remove('hidden');
                        requestBtn.classList.add('hidden');
                        updateStatus('ลงทะเบียนสำเร็จ!', 'success');
                        console.log('FCM Token:', token);
                    } else {
                        updateStatus('ไม่ได้รับ Token กรุณาตรวจสอบการตั้งค่า', 'error');
                    }
                } else {
                    updateStatus('ผู้ใช้ไม่อนุญาตการแจ้งเตือน', 'error');
                }
            } catch (err) {
                console.error('Error:', err);
                updateStatus('เกิดข้อผิดพลาด: ' + err.message, 'error');
            }
        }

        // รับข้อความเมื่อแอปทำงานอยู่ในหน้าหลัก (Foreground)
        onMessage(messaging, (payload) => {
            console.log('Message received. ', payload);
            messageLog.classList.remove('hidden');
            
            const item = document.createElement('div');
            item.className = 'p-2 bg-blue-50 border-l-4 border-blue-500 rounded text-xs';
            item.innerHTML = `<strong>${payload.notification.title}</strong><br>${payload.notification.body}`;
            logContent.prepend(item);

            // แสดง Browser Notification ด้วยตนเอง (สำหรับ Foreground)
            new Notification(payload.notification.title, {
                body: payload.notification.body,
                icon: '/icon.png' // หากมี
            });
        });

        requestBtn.addEventListener('click', requestPermission);

        // ฟังก์ชันคัดลอก Token
        copyBtn.addEventListener('click', () => {
            tokenDisplay.select();
            document.execCommand('copy');
            const originalText = copyBtn.innerText;
            copyBtn.innerText = 'คัดลอกแล้ว!';
            setTimeout(() => copyBtn.innerText = originalText, 2000);
        });

        // ตรวจสอบสถานะเบื้องต้น
        if ('serviceWorker' in navigator) {
            updateStatus('พร้อมลงทะเบียน');
        } else {
            updateStatus('เบราว์เซอร์ไม่รองรับ Service Worker', 'error');
        }
    </script>
</body>
</html>
